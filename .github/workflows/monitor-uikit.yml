name: Monitor UI Kit Changes

# ─── КОГДА ЗАПУСКАТЬ ──────────────────────────────────────────
on:
  schedule:
    # Каждые 6 часов (в 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'

  # Позволяет запустить вручную из вкладки Actions
  workflow_dispatch:

jobs:
  check-uikit:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      # ── Восстанавливаем кеш с прошлым SHA ──
      - name: Restore cached SHA
        uses: actions/cache@v4
        with:
          path: .uikit-cache
          key: uikit-sha-cache

      # ── Спрашиваем у GitHub API последний коммит UI kit ──
      - name: Check for new commits in UI kit
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Запрашиваем SHA последнего коммита в ветке master
          LATEST_SHA=$(gh api repos/AdmiralDS/react-ui/commits/master --jq '.sha')
          echo "Latest SHA: $LATEST_SHA"

          # Читаем сохранённый SHA из кеш-файла
          CACHED_SHA=""
          if [ -f .uikit-cache/last-sha.txt ]; then
            CACHED_SHA=$(cat .uikit-cache/last-sha.txt)
          fi
          echo "Cached SHA: $CACHED_SHA"

          # Сравниваем
          if [ "$LATEST_SHA" != "$CACHED_SHA" ]; then
            echo "🔄 UI kit has new commits!"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          else
            echo "✅ No changes in UI kit"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # ── Сохраняем новый SHA в кеш-файл ──
      - name: Save new SHA to cache
        if: steps.check.outputs.changed == 'true'
        run: |
          mkdir -p .uikit-cache
          echo "${{ steps.check.outputs.sha }}" > .uikit-cache/last-sha.txt

  # ─── ТЕСТЫ (только если есть изменения) ─────────────────────
  test:
    needs: check-uikit
    if: needs.check-uikit.outputs.changed == 'true'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-uikit-monitor
          path: playwright-report/
          retention-days: 30
